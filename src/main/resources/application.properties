spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
logging.level.root=INFO
server.port=8090
uri.pushdata=http://localhost:8090/dataserver/pushdata
uri.getdata=http://localhost:8090/dataserver/data/{blockType}
uri.patchdata=http://localhost:8090/dataserver/update/{name}/{newBlockType}
hadoop.datalake.url=http://localhost:8090/hadoopserver/pushbigdata